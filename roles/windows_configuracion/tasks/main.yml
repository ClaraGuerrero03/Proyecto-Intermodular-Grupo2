---
- name: Crear carpeta de trabajo de Ansible
  ansible.windows.win_file:
    path: C:\Temp\Ansible
    state: directory

- name: Crear carpeta de scripts
  ansible.windows.win_file:
    path: C:\Temp\Ansible\scripts
    state: directory

- name: Crear archivo de control
  ansible.windows.win_copy:
    dest: C:\Temp\Ansible\ok.txt
    content: |
      Equipo gestionado por Ansible correctamente.
      Host: {{ inventory_hostname }}
      IP: {{ ansible_host }}

- name: Crear acceso informativo en escritorio publico
  ansible.windows.win_copy:
    dest: C:\Users\Public\Desktop\INFO-AULA.txt
    content: |
      Equipo configurado por el proyecto intermodular.
      Grupo: {{ group_names | join(', ') }}
      Control remoto: Ansible por WinRM
