---
- name: Crear carpeta temporal de instaladores
  ansible.windows.win_file:
    path: C:\Temp\Instaladores
    state: directory

- name: Instalar Chocolatey
  chocolatey.chocolatey.win_chocolatey:
    name: chocolatey
    state: present

- name: Instalar Firefox
  chocolatey.chocolatey.win_chocolatey:
    name: firefox
    state: present

- name: Instalar VLC
  chocolatey.chocolatey.win_chocolatey:
    name: vlc
    state: present

- name: Instalar LibreOffice
  chocolatey.chocolatey.win_chocolatey:
    name: libreoffice-fresh
    state: present
